<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lightmart CRM Login</title>
    <style>
      :root {
        --ink: #17211f;
        --muted: #687672;
        --line: #dce5e1;
        --bg: #f7f9f6;
        --panel: #ffffff;
        --teal: #1a7f78;
        --nav: #13211d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(23, 33, 31, 0.08);
        border-radius: 10px;
        background: var(--panel);
        box-shadow: 0 18px 44px rgba(23, 33, 31, 0.1);
        padding: 28px;
      }

      h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.15;
      }

      p {
        margin: 8px 0 22px;
        color: var(--muted);
        line-height: 1.45;
      }

      form,
      label {
        display: grid;
        gap: 8px;
      }

      form {
        gap: 14px;
      }

      span {
        color: var(--muted);
        font-size: 12px;
      }

      input {
        min-height: 44px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        font: inherit;
      }

      input:focus {
        outline: 2px solid rgba(26, 127, 120, 0.2);
        border-color: var(--teal);
      }

      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        background: var(--teal);
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .message {
        min-height: 18px;
        margin: 2px 0 0;
        color: #9a2630;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sign in to Lightmart CRM</h1>
      <p>Financial reporting is private. Please sign in before opening the dashboard.</p>
      <form id="loginForm">
        <label>
          <span>Username</span>
          <input name="username" autocomplete="username" required autofocus />
        </label>
        <label>
          <span>Password</span>
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Sign in</button>
        <div class="message" role="status" aria-live="polite"></div>
      </form>
    </main>

    <script>
      const form = document.querySelector("#loginForm");
      const message = document.querySelector(".message");
      const button = form.querySelector("button");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "";
        button.disabled = true;

        const formData = new FormData(form);
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            username: formData.get("username"),
            password: formData.get("password"),
          }),
        });
        const result = await response.json().catch(() => ({}));

        if (response.ok && result.ok) {
          window.location.href = "/";
          return;
        }

        message.textContent = result.error || "Sign in failed.";
        button.disabled = false;
      });
    </script>
  </body>
</html>
