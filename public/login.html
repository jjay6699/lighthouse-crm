<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in to Lightmart CRM</title>
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #0f172a;
        --muted: #64748b;
        --line: rgba(15, 23, 42, 0.08);
        --bg: #f8fafc;
        --panel: rgba(255, 255, 255, 0.85);
        --teal: #0d9488;
        --teal-hover: #0f766e;
        --error: #e11d48;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: radial-gradient(circle at top left, #f8fafc 0%, #cbd5e1 100%);
        color: var(--ink);
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        letter-spacing: -0.02em;
      }

      /* Beautiful background glowing elements for high-end light aesthetics */
      .glow-1 {
        position: absolute;
        top: 15%;
        left: 15%;
        width: 350px;
        height: 350px;
        background: rgba(13, 148, 136, 0.04);
        border-radius: 50%;
        filter: blur(120px);
        pointer-events: none;
        z-index: 0;
      }

      .glow-2 {
        position: absolute;
        bottom: 15%;
        right: 15%;
        width: 350px;
        height: 350px;
        background: rgba(37, 99, 235, 0.03);
        border-radius: 50%;
        filter: blur(120px);
        pointer-events: none;
        z-index: 0;
      }

      main {
        position: relative;
        z-index: 10;
        width: min(100%, 420px);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.08), inset 0 1px 1px rgba(255, 255, 255, 0.9);
        padding: 40px 32px;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      h1 {
        font-size: 23px;
        font-weight: 700;
        color: var(--ink);
        letter-spacing: -0.03em;
        margin-bottom: 8px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .input-group span {
        color: #475569;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-wrapper svg {
        position: absolute;
        left: 12px;
        width: 18px;
        height: 18px;
        color: #64748b;
        pointer-events: none;
      }

      input {
        width: 100%;
        min-height: 44px;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 0 12px 0 40px;
        font-size: 14px;
        color: var(--ink);
        font-family: inherit;
        transition: all 0.15s ease-out;
      }

      input::placeholder {
        color: #94a3b8;
      }

      input:focus {
        outline: none;
        border-color: var(--teal);
        box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
      }

      /* Slide to verify control styling */
      .slide-container {
        position: relative;
        height: 46px;
        background: #f1f5f9;
        border: 1px solid #cbd5e1;
        border-radius: 23px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        user-select: none;
        margin: 5px 0;
      }

      .slide-track {
        position: absolute;
        left: 0;
        top: 0;
        height: 100%;
        width: 0;
        background: #ecfdf5;
        transition: background 0.15s ease;
      }

      .slide-handle {
        position: absolute;
        left: 3px;
        width: 40px;
        height: 40px;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: grab;
        box-shadow: 0 2px 4px rgba(15, 23, 42, 0.05);
        z-index: 10;
        transition: background 0.15s ease, border-color 0.15s ease;
      }

      .slide-handle:active {
        cursor: grabbing;
        background: #f8fafc;
      }

      .slide-handle svg {
        width: 16px;
        height: 16px;
        color: #64748b;
        transition: color 0.15s ease;
      }

      .slide-text {
        position: relative;
        font-size: 13px;
        font-weight: 500;
        color: #64748b;
        z-index: 5;
        pointer-events: none;
        transition: color 0.15s ease, opacity 0.15s ease;
      }

      .slide-container.verified {
        border-color: #a7f3d0;
      }

      .slide-container.verified .slide-track {
        background: #ecfdf5;
        width: 100% !important;
      }

      .slide-container.verified .slide-handle {
        left: calc(100% - 43px) !important;
        background: #10b981;
        border-color: #10b981;
        cursor: default;
      }

      .slide-container.verified .slide-handle svg {
        color: #ffffff;
      }

      .slide-container.verified .slide-text {
        color: #047857;
        font-weight: 600;
      }

      button.submit-btn {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        background: var(--teal);
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 12px rgba(13, 148, 136, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button.submit-btn:hover {
        background: var(--teal-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(13, 148, 136, 0.25);
      }

      button.submit-btn:active {
        transform: translateY(0);
      }

      button.submit-btn:disabled {
        cursor: not-allowed;
        opacity: 0.5;
        transform: none;
        box-shadow: none;
      }

      .message {
        min-height: 20px;
        margin: 2px 0 0;
        color: var(--error);
        font-size: 13px;
        font-weight: 500;
        text-align: center;
      }

      .footer-notice {
        text-align: center;
        font-size: 11px;
        color: #64748b;
        margin-top: 24px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <main>
      <div class="header">
        <h1>Sign in to Lightmart CRM</h1>
        <p class="subtitle">Financial reporting is private. Please sign in before opening the dashboard.</p>
      </div>

      <form id="loginForm">
        <div class="input-group">
          <span>Username</span>
          <div class="input-wrapper">
            <!-- User Icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input name="username" placeholder="Enter username" autocomplete="username" required autofocus />
          </div>
        </div>

        <div class="input-group">
          <span>Password</span>
          <div class="input-wrapper">
            <!-- Lock Icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input name="password" type="password" placeholder="Enter password" autocomplete="current-password" required />
          </div>
        </div>

        <!-- Slide to verify Row -->
        <div class="slide-container" id="slideContainer">
          <div class="slide-track" id="slideTrack"></div>
          <div class="slide-handle" id="slideHandle">
            <!-- Double Chevron Right Icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 17 5-5-5-5M13 17l5-5-5-5" />
            </svg>
          </div>
          <span class="slide-text" id="slideText">Slide to verify</span>
        </div>

        <button type="submit" class="submit-btn" disabled>
          <span>Sign In to Dashboard</span>
          <!-- Chevron Right Icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>

        <div class="message" role="status" aria-live="polite"></div>
      </form>

      <div class="footer-notice">
        Secured connection. Unauthorized access is strictly prohibited and logged.
      </div>
    </main>

    <script>
      const form = document.querySelector("#loginForm");
      const message = document.querySelector(".message");
      const button = form.querySelector("button.submit-btn");
      const slideContainer = document.querySelector("#slideContainer");
      const slideHandle = document.querySelector("#slideHandle");
      const slideTrack = document.querySelector("#slideTrack");
      const slideText = document.querySelector("#slideText");

      let isSliding = false;
      let startX = 0;
      let maxSlideWidth = 0;
      let slideToken = "";
      let slideVerified = false;

      function initSlide() {
        maxSlideWidth = slideContainer.clientWidth - slideHandle.clientWidth - 6;
      }

      // Re-initialize slider width on resize or startup
      window.addEventListener("resize", initSlide);
      setTimeout(initSlide, 150);

      // Handle Mouse sliding events
      slideHandle.addEventListener("mousedown", onSlideStart);
      document.addEventListener("mousemove", onSlideMove);
      document.addEventListener("mouseup", onSlideEnd);

      // Handle Touch sliding events (for mobile and tablet)
      slideHandle.addEventListener("touchstart", onSlideStart);
      document.addEventListener("touchmove", onSlideMove);
      document.addEventListener("touchend", onSlideEnd);

      function onSlideStart(e) {
        if (slideVerified) return;
        isSliding = true;
        startX = e.clientX || e.touches[0].clientX;
        slideHandle.style.transition = "none";
        slideTrack.style.transition = "none";
      }

      function onSlideMove(e) {
        if (!isSliding || slideVerified) return;
        const currentX = e.clientX || (e.touches && e.touches[0].clientX);
        if (currentX === undefined) return;
        
        let deltaX = currentX - startX;

        if (deltaX < 0) deltaX = 0;
        if (deltaX > maxSlideWidth) deltaX = maxSlideWidth;

        slideHandle.style.left = `${deltaX + 3}px`;
        slideTrack.style.width = `${deltaX + 20}px`;

        // Fade out text as you slide
        slideText.style.opacity = Math.max(0, 1 - (deltaX / (maxSlideWidth * 0.7)));
      }

      async function onSlideEnd() {
        if (!isSliding || slideVerified) return;
        isSliding = false;

        const currentLeft = parseInt(slideHandle.style.left, 10) - 3;

        // Verify if slipped to 90%+ of the slider track
        if (currentLeft >= maxSlideWidth * 0.9) {
          slideVerified = true;
          slideContainer.classList.add("verified");
          slideText.textContent = "Verified ✔";
          slideText.style.opacity = "1";
          
          slideHandle.style.transition = "all 0.2s ease";
          slideTrack.style.transition = "all 0.2s ease";
          slideHandle.style.left = "calc(100% - 43px)";
          slideTrack.style.width = "100%";

          // Fetch secure stateless verification token from server
          try {
            const res = await fetch("/api/auth/verify-slide", { method: "POST" });
            const d = await res.json();
            if (d.ok && d.token) {
              slideToken = d.token;
              button.disabled = false; // Enable Submit button
            } else {
              resetSlide();
              message.textContent = "Security validation failed. Please try again.";
            }
          } catch {
            resetSlide();
            message.textContent = "Network error. Please try again.";
          }
        } else {
          resetSlide();
        }
      }

      function resetSlide() {
        slideVerified = false;
        slideToken = "";
        slideContainer.classList.remove("verified");
        slideText.textContent = "Slide to verify";
        slideText.style.opacity = "1";
        button.disabled = true; // Keep Submit button disabled
        
        slideHandle.style.transition = "all 0.25s ease";
        slideTrack.style.transition = "all 0.25s ease";
        slideHandle.style.left = "3px";
        slideTrack.style.width = "0";
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "";
        button.disabled = true;

        const formData = new FormData(form);
        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              username: formData.get("username"),
              password: formData.get("password"),
              slideToken: slideToken,
            }),
          });
          const result = await response.json().catch(() => ({}));

          if (response.ok && result.ok) {
            window.location.href = "/";
            return;
          }

          message.textContent = result.error || "Sign in failed.";
          button.disabled = false;
          // Always reset the slider on submit failures to prevent bot automated attempts
          resetSlide();
        } catch (err) {
          message.textContent = "Network error. Please try again.";
          button.disabled = false;
          resetSlide();
        }
      });
    </script>
  </body>
</html>
