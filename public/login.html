<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in to Lightmart CRM</title>
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #f8fafc;
        --muted: #94a3b8;
        --line: rgba(255, 255, 255, 0.08);
        --bg: #030712;
        --panel: rgba(15, 23, 42, 0.75);
        --teal: #0d9488;
        --teal-hover: #0f766e;
        --error: #f43f5e;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: radial-gradient(circle at top left, #111827 0%, #030712 100%);
        color: var(--ink);
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        letter-spacing: -0.02em;
      }

      /* Beautiful background glowing elements for high-end aesthetics */
      .glow-1 {
        position: absolute;
        top: 20%;
        left: 20%;
        width: 300px;
        height: 300px;
        background: rgba(13, 148, 136, 0.06);
        border-radius: 50%;
        filter: blur(100px);
        pointer-events: none;
        z-index: 0;
      }

      .glow-2 {
        position: absolute;
        bottom: 20%;
        right: 20%;
        width: 300px;
        height: 300px;
        background: rgba(37, 99, 235, 0.05);
        border-radius: 50%;
        filter: blur(100px);
        pointer-events: none;
        z-index: 0;
      }

      main {
        position: relative;
        z-index: 10;
        width: min(100%, 420px);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        padding: 40px 32px;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        box-shadow: 0 4px 12px rgba(13, 148, 136, 0.3);
      }

      .logo-icon svg {
        width: 22px;
        height: 22px;
        color: #ffffff;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -0.03em;
        margin-bottom: 8px;
      }

      .subtitle {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .input-group span {
        color: #e2e8f0;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        opacity: 0.8;
      }

      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .input-wrapper svg {
        position: absolute;
        left: 12px;
        width: 18px;
        height: 18px;
        color: #64748b;
        pointer-events: none;
      }

      input {
        width: 100%;
        min-height: 44px;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        padding: 0 12px 0 40px;
        font-size: 14px;
        color: #ffffff;
        font-family: inherit;
        transition: all 0.15s ease-out;
      }

      input::placeholder {
        color: #475569;
      }

      input:focus {
        outline: none;
        border-color: var(--teal);
        background: rgba(15, 23, 42, 0.6);
        box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
      }

      /* Captcha box styling */
      .captcha-container {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .captcha-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .captcha-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .refresh-btn {
        background: transparent;
        border: 0;
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.15s ease;
      }

      .refresh-btn:hover {
        color: #ffffff;
      }

      .captcha-equation-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .captcha-question {
        font-size: 16px;
        font-weight: 700;
        color: #ffffff;
        background: rgba(255, 255, 255, 0.04);
        padding: 8px 16px;
        border-radius: 6px;
        border: 1px dashed rgba(255, 255, 255, 0.1);
        min-width: 120px;
        text-align: center;
        letter-spacing: 0.05em;
        user-select: none;
      }

      .captcha-input {
        flex: 1;
        padding: 0 12px;
      }

      button.submit-btn {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        background: var(--teal);
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      button.submit-btn:hover {
        background: var(--teal-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(13, 148, 136, 0.3);
      }

      button.submit-btn:active {
        transform: translateY(0);
      }

      button.submit-btn:disabled {
        cursor: wait;
        opacity: 0.7;
        transform: none;
        box-shadow: none;
      }

      .message {
        min-height: 20px;
        margin: 2px 0 0;
        color: var(--error);
        font-size: 13px;
        font-weight: 500;
        text-align: center;
      }

      .footer-notice {
        text-align: center;
        font-size: 11px;
        color: #475569;
        margin-top: 24px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <main>
      <div class="header">
        <div class="logo-icon">
          <!-- Key / Shield Icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </div>
        <h1>Sign in to Lightmart CRM</h1>
        <p class="subtitle">Financial reporting is private. Please sign in before opening the dashboard.</p>
      </div>

      <form id="loginForm">
        <div class="input-group">
          <span>Username</span>
          <div class="input-wrapper">
            <!-- User Icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input name="username" placeholder="Enter username" autocomplete="username" required autofocus />
          </div>
        </div>

        <div class="input-group">
          <span>Password</span>
          <div class="input-wrapper">
            <!-- Lock Icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input name="password" type="password" placeholder="Enter password" autocomplete="current-password" required />
          </div>
        </div>

        <!-- Captcha Row -->
        <div class="captcha-container">
          <div class="captcha-header">
            <span class="captcha-label">Security Verification</span>
            <button type="button" class="refresh-btn" id="refreshCaptcha" title="Refresh Captcha">
              <!-- Refresh Icon -->
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
                <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                <path d="M16 16h5v5" />
              </svg>
            </button>
          </div>
          <div class="captcha-equation-row">
            <div class="captcha-question" id="captchaQuestion">Loading...</div>
            <input class="captcha-input" id="captchaInput" placeholder="Answer" type="number" required style="padding-left: 12px;" />
          </div>
        </div>

        <button type="submit" class="submit-btn">
          <span>Sign In to Dashboard</span>
          <!-- Chevron Right Icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m9 18 6-6-6-6" />
          </svg>
        </button>

        <div class="message" role="status" aria-live="polite"></div>
      </form>

      <div class="footer-notice">
        Secured connection. Unauthorized access is strictly prohibited and logged.
      </div>
    </main>

    <script>
      const form = document.querySelector("#loginForm");
      const message = document.querySelector(".message");
      const button = form.querySelector("button.submit-btn");
      const captchaQuestion = document.querySelector("#captchaQuestion");
      const captchaInput = document.querySelector("#captchaInput");
      const refreshCaptcha = document.querySelector("#refreshCaptcha");

      let currentCaptchaToken = "";

      async function loadCaptcha() {
        captchaQuestion.textContent = "Loading...";
        captchaInput.value = "";
        try {
          const res = await fetch("/api/auth/captcha");
          const d = await res.json();
          if (d.question && d.token) {
            captchaQuestion.textContent = d.question;
            currentCaptchaToken = d.token;
          } else {
            captchaQuestion.textContent = "Error";
          }
        } catch (err) {
          captchaQuestion.textContent = "Offline";
        }
      }

      // Load captcha challenge on startup
      loadCaptcha();

      refreshCaptcha.addEventListener("click", loadCaptcha);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "";
        button.disabled = true;

        const formData = new FormData(form);
        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              username: formData.get("username"),
              password: formData.get("password"),
              captchaAnswer: captchaInput.value,
              captchaToken: currentCaptchaToken,
            }),
          });
          const result = await response.json().catch(() => ({}));

          if (response.ok && result.ok) {
            window.location.href = "/";
            return;
          }

          message.textContent = result.error || "Sign in failed.";
          button.disabled = false;
          // Always reload captcha on failure to prevent brute forcing
          loadCaptcha();
        } catch (err) {
          message.textContent = "Network error. Please try again.";
          button.disabled = false;
          loadCaptcha();
        }
      });
    </script>
  </body>
</html>
